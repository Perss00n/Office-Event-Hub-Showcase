<svg viewBox="0 0 520 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Office Event Hub">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.18"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .wordmark { fill: #0F172A; }
      .tagline  { fill: #64748B; }
      @media (prefers-color-scheme: dark) {
        .wordmark { fill: #F1F5F9; }
        .tagline  { fill: #94A3B8; }
      }
    </style>
  </defs>

  <!-- ICON -->
  <g transform="translate(16, 16)" filter="url(#iconShadow)">
    <!-- Rounded square base with indigo gradient -->
    <rect x="0" y="0" width="108" height="108" rx="24" fill="url(#iconGrad)"/>

    <!-- Calendar tabs on top -->
    <rect x="28" y="14" width="7" height="16" rx="2.5" fill="white" opacity="0.92"/>
    <rect x="73" y="14" width="7" height="16" rx="2.5" fill="white" opacity="0.92"/>

    <!-- Calendar body -->
    <rect x="20" y="26" width="68" height="66" rx="8" fill="white"/>

    <!-- Calendar header bar -->
    <rect x="20" y="26" width="68" height="14" rx="8" fill="#6366F1"/>
    <rect x="20" y="34" width="68" height="6" fill="#6366F1"/>

    <!-- Calendar grid: 4 columns x 3 rows of dots -->
    <g fill="#CBD5E1">
      <!-- Row 1 -->
      <circle cx="32" cy="54" r="2.5"/>
      <circle cx="46" cy="54" r="2.5"/>
      <circle cx="60" cy="54" r="2.5"/>
      <circle cx="74" cy="54" r="2.5"/>
      <!-- Row 2 (event marker replaces one dot below) -->
      <circle cx="32" cy="68" r="2.5"/>
      <circle cx="46" cy="68" r="2.5"/>
      <circle cx="74" cy="68" r="2.5"/>
      <!-- Row 3 -->
      <circle cx="32" cy="82" r="2.5"/>
      <circle cx="46" cy="82" r="2.5"/>
      <circle cx="60" cy="82" r="2.5"/>
      <circle cx="74" cy="82" r="2.5"/>
    </g>

    <!-- Highlighted event dot -->
    <circle cx="60" cy="68" r="5.5" fill="url(#accentGrad)"/>
    <circle cx="60" cy="68" r="5.5" fill="none" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(148, 0)">
    <text x="0" y="68" class="wordmark"
          font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
          font-size="34" font-weight="700" letter-spacing="-0.6">Office Event Hub</text>
    <text x="2" y="94" class="tagline"
          font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
          font-size="12" font-weight="600" letter-spacing="3.5">EVENT&#160;MANAGEMENT&#160;&#160;·&#160;&#160;.NET&#160;ASPIRE</text>
  </g>
</svg>
